version: "3.3"

services:
  schedule:
    build: .
    container_name: cute-schedule
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/app.sqlite
      - SESSION_SECRET=${SESSION_SECRET}
      - GITHUB_REPO=hmbbser/paibanbiao
      - GITHUB_BRANCH=main
      - APP_DIR=/opt/cute-schedule
    volumes:
      - schedule-data:/app/data
      - .:/opt/cute-schedule
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  schedule-data:
